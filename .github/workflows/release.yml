name: Release OLS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare release archive
        run: |
          tar -czf OLS-${{ github.ref_name }}.tar.gz src Makefile README.md LICENSE .version

          cat run_template.sh OLS-${{ github.ref_name }}.tar.gz > setup.run
          chmod 755 setup.run
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: | 
            OLS-${{ github.ref_name }}.tar.gz
            setup.run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
