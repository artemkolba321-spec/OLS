name: Release OLS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "latest_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Build archive and run-file
        run: |
          TAG=${{ steps.tag.outputs.latest_tag }}

          tar -czf OLS-${TAG}.tar.gz src Makefile README.md LICENSE install.sh

          cat run_template.sh OLS-${TAG}.tar.gz > setup.run
          chmod +x setup.run

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            setup.run
            OLS-${{ steps.tag.outputs.latest_tag }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}