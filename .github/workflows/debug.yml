name: "debug CI"

on:
  push:
  pull_request:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y lua
      - name: Bash syntax check 
        run: |
          find src -type f -print0 | while IFS= read -r -d '' f; do
            if head -n1 "$f" | grep -qE '^#!.*(bash|sh)'; then
              echo "Checking syntax: $f"
              bash -n "$f"
            fi
          done
      - name: Lua syntax check
        run: |
          find src -name "*.lua" -print0 | while IFS= read -r -d '' f; do
            echo "Checking Lua syntax: $f"
            lua -p "$f"
          done
